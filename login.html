<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blossom Boutique</title>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        id="bootstrap-css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">



    <div
        class="position-fixed top-0 end-0 m-3 m-md-4 z-3 d-flex align-items-center gap-2 bg-body bg-opacity-75 backdrop-blur border rounded-pill px-3 py-2 shadow-sm">
        <button class="btn btn-link text-secondary p-0 fs-4 shadow-none hover-scale" aria-label="Toggle RTL"
            id="rtlToggleDesktop" title="Toggle RTL">
            <span class="fw-bold small">RTL</span>
        </button>
        <div class="vr mx-1 opacity-25"></div>
        <button class="btn btn-link text-secondary p-0 fs-4 shadow-none theme-toggle-btn hover-scale"
            aria-label="Toggle Theme">
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5 text-center">
                    <div class="card border-0 shadow-lg p-4 p-md-5 position-relative">
                        <div class="text-center mb-4">
                            <a href="index.html" class="d-inline-block">
                                <img src="assets/images/logo.svg" alt="Blossom Boutique Logo"
                                    style="height: 45px; margin-bottom: 1.5rem;">
                            </a>
                            <h1 class="h3 fw-bold mb-0">Welcome Back</h1>
                        </div>

                        <form action="index.html" class="text-start">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Email address</label>
                                <input type="email" class="form-control form-control-lg px-4" id="email"
                                    placeholder="name@example.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-medium">Password</label>
                                <input type="password" class="form-control form-control-lg px-4 mb-3" id="password"
                                    placeholder="••••••••" required>
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="form-check mb-0">
                                        <input type="checkbox" class="form-check-input" id="rememberMe">
                                        <label class="form-check-label text-muted small" for="rememberMe">Remember
                                            me</label>
                                    </div>
                                    <a href="#" class="small text-primary text-decoration-none fw-medium">Forgot
                                        password?</a>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">Sign In</button>

                            <div class="d-flex align-items-center mb-4">
                                <hr class="flex-grow-1 bg-secondary opacity-25">
                                <span class="mx-3 text-muted small text-uppercase fw-medium">Or login with</span>
                                <hr class="flex-grow-1 bg-secondary opacity-25">
                            </div>

                            <div class="d-flex justify-content-center gap-3 mb-4">
                                <button type="button"
                                    class="btn btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center hover-scale"
                                    style="width: 50px; height: 50px;" title="Google">
                                    <i class="bi bi-google text-danger fs-4"></i>
                                </button>
                                <button type="button"
                                    class="btn btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center hover-scale"
                                    style="width: 50px; height: 50px;" title="Facebook">
                                    <i class="bi bi-facebook text-primary fs-4"></i>
                                </button>
                                <button type="button"
                                    class="btn btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center hover-scale"
                                    style="width: 50px; height: 50px;" title="Apple">
                                    <i class="bi bi-apple fs-4 text-primary"></i>
                                </button>
                            </div>

                            <div class="text-center">
                                <p class="text-muted mb-0">Don't have an account? <a href="register.html"
                                        class="text-primary fw-medium text-decoration-none">Sign up</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <!-- Bootstrap JS & Theme -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const themeToggles = document.querySelectorAll('#themeToggleDesktop, #themeToggleMobile, .theme-toggle-btn');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            const iconClass = theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill';
            themeToggles.forEach(toggle => { toggle.innerHTML = `<i class="bi ${iconClass} fs-5"></i>`; });
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        themeToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        });
    </script>

    <!-- RTL Toggle Logic -->
    <script>
        const rtlToggles = document.querySelectorAll('#rtlToggleDesktop');
        const bsCss = document.getElementById('bootstrap-css');

        const translations = {
            'en': {
                'welcome': 'Welcome Back',
                'email': 'Email address',
                'password': 'Password',
                'signin': 'Sign In',
                'or': 'Or login with',
                'no_account': "Don't have an account?",
                'signup': 'Sign up',
                'rtl': 'RTL',
                'forgot': 'Forgot password?',
                'remember': 'Remember me'
            },
            'ar': {
                'welcome': 'مرحباً بك مجدداً',
                'email': 'عنوان البريد الإلكتروني',
                'password': 'كلمة المرور',
                'signin': 'تسجيل الدخول',
                'or': 'أو الدخول بواسطة',
                'no_account': 'ليس لديك حساب؟',
                'signup': 'اشترك الآن',
                'rtl': 'English',
                'forgot': 'هل نسيت كلمة المرور؟',
                'remember': 'تذكرني'
            }
        };

        function setRTL(isRTL) {
            const lang = isRTL ? 'ar' : 'en';
            const t = translations[lang];
            document.documentElement.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', lang);
            localStorage.setItem('isRTL', isRTL);

            if (isRTL) {
                if (bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css';
            } else {
                if (bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css';
            }

            // Update Text Content
            document.querySelector('h1').textContent = t['welcome'];
            document.querySelector('label[for="email"]').textContent = t['email'];
            document.querySelector('label[for="password"]').textContent = t['password'];
            document.querySelector('button[type="submit"]').textContent = t['signin'];
            document.querySelector('.mx-3.text-muted').textContent = t['or'];
            document.querySelector('.text-muted.mb-0').childNodes[0].textContent = t['no_account'] + ' ';
            document.querySelector('a[href="register.html"]').textContent = t['signup'];
            document.querySelector('#rtlToggleDesktop span').textContent = t['rtl'];
            document.querySelector('.form-check-label').textContent = t['remember'];
            document.querySelector('a[href="#"].small').textContent = t['forgot'];
        }

        const savedRTL = localStorage.getItem('isRTL') === 'true';
        if (savedRTL) {
            setRTL(true);
        }

        rtlToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentRTL = document.documentElement.getAttribute('dir') === 'rtl';
                setRTL(!currentRTL);
            });
        });
    </script>

    <script>
        // Make desktop dropdown toggles clickable links instead of just opening menus
        document.querySelectorAll('.dropdown-toggle').forEach(item => {
            item.addEventListener('click', function (e) {
                if (window.innerWidth >= 1100 && this.getAttribute('href') && this.getAttribute('href') !== '#') {
                    window.location.href = this.getAttribute('href');
                }
            });
        });

        // Highlight active menu item
        document.addEventListener("DOMContentLoaded", function () {
            let currentPath = window.location.pathname.split("/").pop();
            if (currentPath === "") currentPath = "index.html";

            const navLinks = document.querySelectorAll('.navbar-nav .nav-link, .dropdown-menu .dropdown-item');

            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                    const parentDropdown = link.closest('.dropdown');
                    if (parentDropdown) {
                        const toggle = parentDropdown.querySelector('.dropdown-toggle');
                        if (toggle) toggle.classList.add('active');
                    }
                }
            });

            if (currentPath.startsWith('shop-') || currentPath.startsWith('occasion-') || currentPath === 'occasions.html' || currentPath === 'shop.html') {
                const shopDropdown = document.getElementById('shopDropdown');
                if (shopDropdown) shopDropdown.classList.add('active');
            } else if (currentPath === 'home-2.html') {
                const homeDropdown = document.getElementById('homeDropdown');
                if (homeDropdown) homeDropdown.classList.add('active');
            }
        });
    </script>
</body>

</html>
