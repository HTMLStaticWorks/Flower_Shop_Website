<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Blossom Boutique</title>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        id="bootstrap-css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 5rem;
        }

        .auth-page-controls {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1050;
            display: flex;
            gap: 0.25rem;
        }

        .auth-page-controls .btn {
            width: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .auth-logo {
            width: 140px;
            height: auto;
        }

        .password-toggle {
            cursor: pointer;
        }

        .password-toggle:focus {
            box-shadow: none;
        }

        .password-toggle i {
            pointer-events: none;
        }

        .social-btn {
            background-color: var(--bg-white) !important;
            color: var(--text-main) !important;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 15px !important;
            border: 1px solid var(--border-light) !important;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05) !important;
        }

        [data-bs-theme="dark"] .social-btn i.bi-apple {
            color: #fff !important;
        }
    </style>
</head>

<body class="bg-body-tertiary">

    <div class="auth-page-controls">
        <button class="btn btn-sm btn-light text-primary shadow-sm border border-opacity-10 rounded-pill px-2"
            id="rtlToggle" aria-label="Toggle RTL" title="Toggle RTL">
            <span class="fw-bold small">RTL</span>
        </button>
        <button class="btn btn-sm btn-light text-primary shadow-sm border border-opacity-10 rounded-pill px-2"
            id="themeToggle" aria-label="Toggle Theme" title="Toggle Theme">
            <i class="bi bi-moon-stars-fill fs-5"></i>
        </button>
    </div>

    <main class="login-container p-3 p-md-4">
        <div class="w-100" style="max-width: 450px;" data-reveal="fade-up">
            <div class="glass-panel p-4 p-md-5 shadow-lg border-opacity-10" style="border-radius: 30px;">
                <div class="text-center mb-5">
                    <a href="index.html" class="d-inline-flex justify-content-center mb-3">
                        <img src="assets/images/logo.svg" alt="Blossom Logo" class="auth-logo">
                    </a>
                    <h1 class="display-6 fw-bold mb-2">Welcome Back</h1>
                    <p class="text-muted">Enter your details to access your account</p>
                </div>

                <form>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase ms-1"
                            style="letter-spacing: 0.5px;">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 px-3"><i
                                    class="bi bi-envelope text-primary"></i></span>
                            <input type="email" class="form-control bg-light border-0 py-3 shadow-none"
                                placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase ms-1"
                            style="letter-spacing: 0.5px;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0 px-3"><i
                                    class="bi bi-lock text-primary"></i></span>
                            <input id="loginPassword" type="password"
                                class="form-control bg-light border-0 py-3 shadow-none" placeholder="••••••••"
                                autocomplete="current-password" required>
                            <button class="input-group-text bg-light border-0 px-3 password-toggle" type="button"
                                aria-label="Show password" aria-controls="loginPassword" aria-pressed="false"
                                title="Show password" data-password-toggle>
                                <i class="bi bi-eye text-primary"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-5 d-flex align-items-center justify-content-between small">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input shadow-none" id="remember">
                            <label class="form-check-label text-muted" for="remember">Keep me logged in</label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none">Forgot password?</a>
                    </div>

                    <button type="submit"
                        class="btn btn-primary btn-lg w-100 py-3 rounded-pill shadow-lg glow-on-hover mb-4">
                        <span class="fw-bold">Login to Account</span>
                    </button>

                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 text-muted opacity-25">
                        <span class="px-3 text-muted small fw-medium text-uppercase" style="letter-spacing: 1px;">Or
                            continue with</span>
                        <hr class="flex-grow-1 text-muted opacity-25">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <button type="button"
                                class="btn social-btn w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-google text-danger fs-5"></i>
                                <span class="small fw-bold">Google</span>
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button"
                                class="btn social-btn w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-apple text-primary fs-5"></i>
                                <span class="small fw-bold">Apple</span>
                            </button>
                        </div>
                    </div>

                    <p class="text-center text-muted small mb-0">
                        Don't have an account? <a href="register.html"
                            class="text-primary fw-bold text-decoration-none">Create One</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme Toggle Logic -->
    <script>
        const themeToggles = document.querySelectorAll('#themeToggle');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            const iconClass = theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill';
            themeToggles.forEach(toggle => {
                toggle.innerHTML = `<i class="bi ${iconClass} fs-5"></i>`;
            });
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        themeToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        });
    </script>

    <!-- RTL Toggle Logic -->
    <script>
        const rtlToggles = document.querySelectorAll('#rtlToggle');
        const bsCss = document.getElementById('bootstrap-css');

        function setRTL(isRTL) {
            document.documentElement.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', isRTL ? 'ar' : 'en');
            localStorage.setItem('isRTL', isRTL);

            if (isRTL) {
                if (bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css';
            } else {
                if (bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css';
            }
        }

        const savedRTL = localStorage.getItem('isRTL') === 'true';
        setRTL(savedRTL);

        rtlToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentRTL = document.documentElement.getAttribute('dir') === 'rtl';
                setRTL(!currentRTL);
            });
        });
    </script>

    <script>
        document.querySelectorAll('[data-password-toggle]').forEach(toggle => {
            toggle.addEventListener('click', () => {
                const targetId = toggle.getAttribute('aria-controls');
                const input = targetId ? document.getElementById(targetId) : null;
                if (!input) return;

                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';

                const icon = toggle.querySelector('i');
                if (icon) {
                    icon.classList.toggle('bi-eye', !isHidden);
                    icon.classList.toggle('bi-eye-slash', isHidden);
                }

                const label = isHidden ? 'Hide password' : 'Show password';
                toggle.setAttribute('aria-label', label);
                toggle.setAttribute('title', label);
                toggle.setAttribute('aria-pressed', String(isHidden));
            });
        });
    </script>

    <!-- Custom JS -->
    <script src="js/animations.js"></script>
</body>

</html>
