<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Blossom Boutique</title>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">



    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-9 col-lg-7 col-xl-6 text-center">
                    <div class="card border-0 shadow p-4 p-md-5 position-relative">
                        <!-- Theme and RTL Toggle Buttons -->
                        <div class="position-absolute top-0 end-0 m-3 d-flex align-items-center gap-1">
                            <button class="btn btn-link text-secondary p-0 fs-4 shadow-none"
                                aria-label="Toggle RTL" id="rtlToggleDesktop" title="Toggle RTL">
                                <i class="bi bi-translate"></i>
                            </button>
                            <button class="btn btn-link text-secondary p-0 fs-4 shadow-none theme-toggle-btn"
                                aria-label="Toggle Theme">
                                <i class="bi bi-moon-stars-fill"></i>
                            </button>
                        </div>
                        <div class="text-center mb-4">
                            <a href="index.html" class="d-inline-block">
                                <img src="assets/images/logo.svg" alt="Blossom Boutique Logo"
                                    style="height: 45px; margin-bottom: 1.5rem;">
                            </a>
                            <h1 class="h3 fw-bold mb-0">Create Account</h1>
                        </div>

                        <form action="index.html" class="text-start">
                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label for="fname" class="form-label fw-medium">First Name</label>
                                    <input type="text" class="form-control form-control-lg px-4" id="fname" required>
                                </div>
                                <div class="col-sm-6">
                                    <label for="lname" class="form-label fw-medium">Last Name</label>
                                    <input type="text" class="form-control form-control-lg px-4" id="lname" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Email address</label>
                                <input type="email" class="form-control form-control-lg px-4" id="email"
                                    placeholder="name@example.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-medium">Password</label>
                                <input type="password" class="form-control form-control-lg px-4" id="password" required>
                                <div class="form-text text-muted">Must be at least 8 characters long.</div>
                            </div>

                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-medium">Confirm Password</label>
                                <input type="password" class="form-control form-control-lg px-4" id="confirm_password"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">Create Account</button>

                            <div class="d-flex align-items-center mb-4">
                                <hr class="flex-grow-1 bg-secondary opacity-25">
                                <span class="mx-3 text-muted small text-uppercase fw-medium">Or sign up with</span>
                                <hr class="flex-grow-1 bg-secondary opacity-25">
                            </div>

                            <div class="d-flex justify-content-center gap-3 mb-4">
                                <button type="button"
                                    class="btn btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center"
                                    style="width: 50px; height: 50px; transition: transform 0.2s ease;"
                                    onmouseover="this.style.transform='translateY(-2px)'"
                                    onmouseout="this.style.transform='none'" title="Google">
                                    <i class="bi bi-google text-danger fs-4"></i>
                                </button>
                                <button type="button"
                                    class="btn btn-light border rounded-circle shadow-sm d-flex align-items-center justify-content-center"
                                    style="width: 50px; height: 50px; transition: transform 0.2s ease;"
                                    onmouseover="this.style.transform='translateY(-2px)'"
                                    onmouseout="this.style.transform='none'" title="Facebook">
                                    <i class="bi bi-facebook text-primary fs-4"></i>
                                </button>
                            </div>

                            <div class="text-center">
                                <p class="text-muted mb-0">Already have an account? <a href="login.html"
                                        class="text-primary fw-medium text-decoration-none">Sign in</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <!-- Bootstrap JS & Theme -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const themeToggles = document.querySelectorAll('#themeToggleDesktop, #themeToggleMobile, .theme-toggle-btn');
        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            const iconClass = theme === 'dark' ? 'bi-sun-fill' : 'bi-moon-stars-fill';
            themeToggles.forEach(toggle => { toggle.innerHTML = `<i class="bi ${iconClass} fs-5"></i>`; });
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        themeToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        });
    </script>

    <!-- RTL Toggle Logic -->
    <script>
        const rtlToggles = document.querySelectorAll('#rtlToggleDesktop');
        const bsCss = document.getElementById('bootstrap-css');

        function setRTL(isRTL) {
            document.documentElement.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', isRTL ? 'ar' : 'en');
            localStorage.setItem('isRTL', isRTL);
            
            if (isRTL) {
                if(bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css';
            } else {
                if(bsCss) bsCss.href = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css';
            }
        }

        const savedRTL = localStorage.getItem('isRTL') === 'true';
        if (savedRTL) {
            setRTL(true);
        }

        rtlToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                const currentRTL = document.documentElement.getAttribute('dir') === 'rtl';
                setRTL(!currentRTL);
            });
        });
    </script>

    <script>
        // Make desktop dropdown toggles clickable links instead of just opening menus
        document.querySelectorAll('.dropdown-toggle').forEach(item => {
            item.addEventListener('click', function (e) {
                if (window.innerWidth >= 1100 && this.getAttribute('href') && this.getAttribute('href') !== '#') {
                    window.location.href = this.getAttribute('href');
                }
            });
        });

        // Highlight active menu item
        document.addEventListener("DOMContentLoaded", function () {
            let currentPath = window.location.pathname.split("/").pop();
            if (currentPath === "") currentPath = "index.html";

            const navLinks = document.querySelectorAll('.navbar-nav .nav-link, .dropdown-menu .dropdown-item');

            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath) {
                    link.classList.add('active');
                    const parentDropdown = link.closest('.dropdown');
                    if (parentDropdown) {
                        const toggle = parentDropdown.querySelector('.dropdown-toggle');
                        if (toggle) toggle.classList.add('active');
                    }
                }
            });

            if (currentPath.startsWith('shop-') || currentPath.startsWith('occasion-') || currentPath === 'occasions.html' || currentPath === 'shop.html') {
                const shopDropdown = document.getElementById('shopDropdown');
                if (shopDropdown) shopDropdown.classList.add('active');
            } else if (currentPath === 'home-2.html') {
                const homeDropdown = document.getElementById('homeDropdown');
                if (homeDropdown) homeDropdown.classList.add('active');
            }
        });
    </script>
</body>

</html>
